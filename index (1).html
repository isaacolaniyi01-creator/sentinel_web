<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Sentinel — Check-in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --cream:#FAF6EF; --forest:#2F4F3A; --forest-light:#3D6B4F; --bark:#6B5B4E;
    --hairline:#E6DFD2; --ink:#2A2620; --coral:#E0714F; --coral-dim:#F6E3DA; --success:#3C7A4E;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:var(--cream);color:var(--ink);
    font-family:'Nunito',sans-serif; -webkit-font-smoothing:antialiased;}
  #app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

  /* Status header */
  .status-bar{padding:16px 18px 14px; border-bottom:1px solid var(--hairline); background:var(--cream); z-index:20;}
  .status-bar.triggered{background:var(--coral); }
  .status-bar.resolved{background:var(--success);}
  .eyebrow{font-size:11px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; color:var(--bark); margin:0 0 4px;}
  .status-bar.triggered .eyebrow, .status-bar.resolved .eyebrow{color:rgba(255,255,255,0.85);}
  .headline{font-size:19px; font-weight:800; margin:0; letter-spacing:-0.2px; color:var(--ink); display:flex; align-items:center; gap:8px;}
  .status-bar.triggered .headline, .status-bar.resolved .headline{color:#fff;}
  .sub{font-size:13px; font-weight:600; color:var(--bark); margin:4px 0 0;}
  .status-bar.triggered .sub, .status-bar.resolved .sub{color:rgba(255,255,255,0.9);}

  .pulse-dot{width:9px;height:9px;border-radius:50%;background:var(--forest-light);flex-shrink:0;position:relative;}
  .pulse-dot::after{content:'';position:absolute;inset:-6px;border-radius:50%;border:2px solid var(--forest-light);
    animation:pulseRing 2s ease-out infinite;}
  .status-bar.triggered .pulse-dot,.status-bar.triggered .pulse-dot::after{background:#fff;border-color:#fff;}
  @keyframes pulseRing{0%{transform:scale(0.5);opacity:0.9;}100%{transform:scale(2.2);opacity:0;}}

  /* Map */
  #map-wrap{flex:1; position:relative; background:#e9e4d8;}
  #map{position:absolute; inset:0;}
  .map-overlay{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:10px; background:var(--cream); text-align:center; padding:0 40px;}
  .map-overlay .spinner{width:26px;height:26px;border-radius:50%;border:3px solid var(--hairline);
    border-top-color:var(--forest); animation:spin 0.9s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .map-overlay p{font-size:13.5px;font-weight:600;color:var(--bark);margin:0;line-height:1.5;}

  /* Bottom panel */
  .panel{padding:16px 18px calc(18px + env(safe-area-inset-bottom)); background:var(--card);
    border-top:1px solid var(--hairline); z-index:20;}
  .meta-row{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px;}
  .meta-row .label{font-size:11px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--bark);}
  .meta-row .value{font-size:13px;font-weight:700;color:var(--ink);}

  .monitor-btn{width:100%; padding:16px; border-radius:16px; border:none; font-family:'Nunito',sans-serif;
    font-size:16px; font-weight:800; background:var(--forest); color:var(--cream); cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:8px; transition:transform .12s ease, opacity .2s;}
  .monitor-btn:active{transform:scale(0.98);}
  .monitor-btn.on{background:var(--coral-dim); color:var(--coral);}
  .monitor-btn:disabled{cursor:default;}
  .monitor-count{margin-top:10px; text-align:center; font-size:12.5px; font-weight:600; color:var(--bark);}
  .monitor-count b{color:var(--ink);}

  .hidden{display:none !important;}

  /* Not found state */
  .full-state{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:40px; text-align:center; gap:10px;}
  .full-state .icon{font-size:34px;}
  .full-state h1{font-size:19px; margin:0; font-weight:800;}
  .full-state p{font-size:14px; color:var(--bark); margin:0; max-width:280px; line-height:1.5; font-weight:600;}
</style>
</head>
<body>
<div id="app">

  <div id="not-found" class="full-state hidden">
    <div class="icon">🔗</div>
    <h1>This link isn't active</h1>
    <p>The check-in session has ended, or the link is incorrect. Ask the person who sent it to confirm.</p>
  </div>

  <div id="main-ui" class="hidden">
    <div id="status-bar" class="status-bar">
      <p class="eyebrow" id="eyebrow">SENTINEL CHECK-IN</p>
      <h1 class="headline"><span class="pulse-dot" id="pulseDot"></span><span id="headline-text">Loading…</span></h1>
      <p class="sub" id="sub-text"></p>
    </div>

    <div id="map-wrap">
      <div id="map"></div>
      <div class="map-overlay" id="map-overlay">
        <div class="spinner"></div>
        <p>Waiting for location.<br>This updates automatically once their phone sends its first signal.</p>
      </div>
    </div>

    <div class="panel">
      <div class="meta-row">
        <span class="label">Check-in expected by</span>
        <span class="value" id="expected-time">—</span>
      </div>
      <button class="monitor-btn" id="monitor-btn">I'm Monitoring</button>
      <p class="monitor-count" id="monitor-count"></p>
    </div>
  </div>

</div>

<script>
// ====== FILL THESE TWO IN, THEN SAVE ======
const SUPABASE_URL = "https://lymulngqspocixtxhdxi.supabase.coL";
const SUPABASE_ANON_KEY = "sb_publishable_PGCsh2KfSeryvoJ3s6RkuQ_tCnlDSuI";
// ===========================================

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const params = new URLSearchParams(window.location.search);
const sessionId = params.get('s');

const notFoundEl = document.getElementById('not-found');
const mainUiEl = document.getElementById('main-ui');
const statusBar = document.getElementById('status-bar');
const eyebrow = document.getElementById('eyebrow');
const headlineText = document.getElementById('headline-text');
const subText = document.getElementById('sub-text');
const expectedTime = document.getElementById('expected-time');
const mapOverlay = document.getElementById('map-overlay');
const monitorBtn = document.getElementById('monitor-btn');
const monitorCount = document.getElementById('monitor-count');

let map, marker, polyline, path = [];
let currentState = null;

function fmtTime(iso){
  const d = new Date(iso);
  return d.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
}

function initMap(lat, lng){
  map = L.map('map', {zoomControl:true, attributionControl:false}).setView([lat, lng], 16);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  const icon = L.divIcon({
    className: '',
    html: '<div style="width:16px;height:16px;border-radius:50%;background:#2F4F3A;border:3px solid #FAF6EF;box-shadow:0 0 0 2px #2F4F3A;"></div>',
    iconSize:[16,16], iconAnchor:[8,8]
  });
  marker = L.marker([lat, lng], {icon}).addTo(map);
  polyline = L.polyline([], {color:'#3D6B4F', weight:3, opacity:0.6}).addTo(map);
  mapOverlay.classList.add('hidden');
}

function pushCoordinate(lat, lng){
  if (!map) { initMap(lat, lng); }
  else { marker.setLatLng([lat, lng]); map.panTo([lat, lng]); }
  path.push([lat, lng]);
  polyline.setLatLngs(path);
}

function renderStatus(session){
  currentState = session.state;
  statusBar.classList.remove('triggered','resolved');
  const label = session.label ? ` (${session.label})` : '';

  if (session.state === 'armed' || session.state === 'grace'){
    eyebrow.textContent = 'SENTINEL CHECK-IN — ACTIVE';
    headlineText.textContent = `${session.user_name} is checked in${label}`;
    subText.textContent = "You'll be notified automatically if they don't check in on time.";
    expectedTime.textContent = fmtTime(session.check_in_by);
    monitorBtn.classList.remove('hidden');
    document.querySelector('.panel').classList.remove('hidden');
  } else if (session.state === 'triggered'){
    statusBar.classList.add('triggered');
    eyebrow.textContent = 'NO CHECK-IN RECEIVED';
    headlineText.textContent = `${session.user_name} hasn't checked in`;
    subText.textContent = 'Please try to reach them and check on them now.';
    expectedTime.textContent = fmtTime(session.check_in_by);
    monitorBtn.classList.remove('hidden');
  } else if (session.state === 'resolved'){
    statusBar.classList.add('resolved');
    eyebrow.textContent = 'CHECKED IN SAFE';
    headlineText.textContent = `${session.user_name} is safe`;
    subText.textContent = 'This session has ended. This link will stop working shortly.';
    monitorBtn.classList.add('hidden');
    monitorCount.textContent = '';
  }
}

async function loadInitial(){
  const { data: session, error } = await sb.from('sessions').select('*').eq('id', sessionId).single();
  if (error || !session){
    notFoundEl.classList.remove('hidden');
    return;
  }
  mainUiEl.classList.remove('hidden');
  renderStatus(session);

  // last known + full path so far
  const { data: coords } = await sb.from('coordinates').select('lat,lng,recorded_at')
    .eq('session_id', sessionId).order('recorded_at', {ascending:true});
  if (coords && coords.length){
    coords.forEach(c => pushCoordinate(c.lat, c.lng));
  }

  const { count } = await sb.from('monitors').select('*', {count:'exact', head:true}).eq('session_id', sessionId);
  updateMonitorCount(count || 0);

  const deviceId = getDeviceId();
  const { data: existing } = await sb.from('monitors').select('device_id').eq('session_id', sessionId).eq('device_id', deviceId).maybeSingle();
  if (existing) setMonitoringOn();
}

function updateMonitorCount(n){
  monitorCount.textContent = n === 0 ? '' : `${n} ${n === 1 ? 'person is' : 'people are'} monitoring`;
}

function getDeviceId(){
  let id = localStorage.getItem('sentinel_device_id');
  if (!id){ id = crypto.randomUUID(); localStorage.setItem('sentinel_device_id', id); }
  return id;
}

function setMonitoringOn(){
  monitorBtn.textContent = "You're Monitoring ✓";
  monitorBtn.classList.add('on');
  monitorBtn.disabled = true;
}

monitorBtn.addEventListener('click', async () => {
  monitorBtn.disabled = true;
  const deviceId = getDeviceId();
  const { error } = await sb.from('monitors').insert({ session_id: sessionId, device_id: deviceId });
  if (!error) setMonitoringOn();
  else { monitorBtn.disabled = false; }
});

// live coordinate updates
function subscribeRealtime(){
  sb.channel(`coords-${sessionId}`)
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'coordinates', filter:`session_id=eq.${sessionId}` },
      payload => pushCoordinate(payload.new.lat, payload.new.lng))
    .subscribe();

  sb.channel(`monitors-${sessionId}`)
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'monitors', filter:`session_id=eq.${sessionId}` },
      async () => {
        const { count } = await sb.from('monitors').select('*', {count:'exact', head:true}).eq('session_id', sessionId);
        updateMonitorCount(count || 0);
      })
    .subscribe();
}

// poll session state every 4s (state isn't on realtime publication)
function pollSession(){
  setInterval(async () => {
    const { data: session } = await sb.from('sessions').select('*').eq('id', sessionId).single();
    if (session && session.state !== currentState) renderStatus(session);
  }, 4000);
}

if (!sessionId || SUPABASE_URL === "YOUR_SUPABASE_URL"){
  notFoundEl.classList.remove('hidden');
  if (!SUPABASE_URL || SUPABASE_URL === "YOUR_SUPABASE_URL"){
    document.querySelector('#not-found p').textContent = 'Setup incomplete: add your Supabase URL and key in index.html.';
  }
} else {
  loadInitial().then(() => { subscribeRealtime(); pollSession(); });
}
</script>
</body>
</html>
